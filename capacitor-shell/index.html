<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>QuoteCraft</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        background: #f5f7fb;
        color: #122033;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(27, 99, 242, 0.12), transparent 42%),
          linear-gradient(180deg, #f9fbff 0%, #f2f5fb 100%);
      }

      main {
        width: min(92vw, 520px);
        padding: 32px 24px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 24px 60px rgba(18, 32, 51, 0.12);
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
        line-height: 1.2;
      }

      p {
        margin: 0;
        font-size: 15px;
        line-height: 1.7;
        color: #506176;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>QuoteCraft 正在启动</h1>
      <p>当前 App 使用远程站点壳模式。若看到此页面，请检查移动端配置中的站点地址是否可访问。</p>
    </main>
  </body>
</html>
